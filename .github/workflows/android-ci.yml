name: Android CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Build, lint and test
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android 17 SDK
        run: sdkmanager "platforms;android-37" "build-tools;36.0.0"

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Verify app
        run: ./gradlew :app:lintDebug :app:testDebugUnitTest :app:assembleDebug :app:assembleDebugAndroidTest --stacktrace

      - name: Upload debug APK and reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: thor-stream-butler-debug-${{ github.run_number }}
          if-no-files-found: warn
          retention-days: 14
          path: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/reports/lint-results-debug.html
            app/build/reports/tests/testDebugUnitTest/

