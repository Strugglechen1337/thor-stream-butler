name: Android CI / Android-Prüfung

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Build, lint and test / Bauen, prüfen und testen
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Check out repository / Repository auschecken
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Java 17 / Java 17 einrichten
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle / Gradle einrichten
        uses: gradle/actions/setup-gradle@90ddb51e90a5fd9ba75f40cf85156b7b41bf76a3 # v6

      - name: Set up Android SDK / Android SDK einrichten
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4

      - name: Install Android 17 SDK / Android-17-SDK installieren
        run: sdkmanager "platforms;android-37.0" "build-tools;36.0.0"

      - name: Make Gradle wrapper executable / Gradle Wrapper ausführbar machen
        run: chmod +x gradlew

      - name: Verify debug and optimized release / Debug und optimiertes Release prüfen
        run: ./gradlew :app:lintDebug :app:lintRelease :app:testDebugUnitTest :app:assembleDebug :app:assembleRelease :app:bundleRelease :app:assembleDebugAndroidTest --stacktrace

      - name: Upload debug APK and reports / Debug-APK und Berichte hochladen
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: thor-stream-butler-debug-${{ github.run_number }}
          if-no-files-found: warn
          retention-days: 14
          path: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/apk/release/app-release-unsigned.apk
            app/build/outputs/bundle/release/app-release.aab
            app/build/reports/lint-results-debug.html
            app/build/reports/tests/testDebugUnitTest/

  instrumented:
    name: Android 15 device tests / Android-15-Gerätetests
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository / Repository auschecken
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Java 17 / Java 17 einrichten
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle / Gradle einrichten
        uses: gradle/actions/setup-gradle@90ddb51e90a5fd9ba75f40cf85156b7b41bf76a3 # v6

      - name: Set up Android SDK / Android SDK einrichten
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4

      - name: Install Android 17 SDK / Android-17-SDK installieren
        run: sdkmanager "platforms;android-37.0" "build-tools;36.0.0"

      - name: Enable hardware acceleration / Hardwarebeschleunigung aktivieren
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Make Gradle wrapper executable / Gradle Wrapper ausführbar machen
        run: chmod +x gradlew

      - name: Run Android 15 tests / Android-15-Tests ausführen
        uses: ReactiveCircus/android-emulator-runner@0a638108440efd5c7f980e6ba145dbcdd8f32009 # v2.37.0
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_7
          disable-animations: true
          script: ./gradlew :app:connectedDebugAndroidTest --stacktrace
