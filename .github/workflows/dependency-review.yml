name: Dependency review / Abhängigkeitsprüfung

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: dependency-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    name: Vulnerability review / Schwachstellenprüfung
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository / Repository auschecken
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Review dependency changes / Abhängigkeitsänderungen prüfen
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: moderate
