# Publishes an APK and SHA-256 checksum whenever a version tag (v*) is pushed.
# Veröffentlicht APK und SHA-256-Prüfsumme für jeden gepushten Versions-Tag (v*).
#
# Stable tags require all four production-signing secrets. Prerelease tags
# (alpha, beta, rc, or any tag containing "-") may fall back to an explicitly
# named debug APK when no signing secrets are configured. A partial signing
# configuration always fails closed.
# Stabile Tags benötigen alle vier produktiven Signing-Secrets. Prerelease-Tags
# dürfen ohne Signing-Secrets auf eine eindeutig benannte Debug-APK zurückfallen.
# Eine unvollständige Signing-Konfiguration schlägt immer sicher fehl.
#
# Production-signing repository secrets:
#   SIGNING_KEYSTORE_BASE64   – base64 of signing/thor-stream-release.jks
#   SIGNING_STORE_PASSWORD    – keystore password
#   SIGNING_KEY_ALIAS         – key alias
#   SIGNING_KEY_PASSWORD      – key password
name: Release / Veröffentlichung

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag / Existierender Release-Tag, e.g. v0.3.0-alpha.1"
        required: true
        type: string

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    steps:
      - name: Check out repository / Repository auschecken
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - name: Validate release identity / Release-Identität prüfen
        shell: bash
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
            echo "::error::Invalid release tag / Ungültiger Release-Tag: $RELEASE_TAG"
            exit 1
          fi

          if ! git rev-parse --verify --quiet "refs/tags/${RELEASE_TAG}^{commit}" >/dev/null; then
            echo "::error::The release tag does not exist / Der Release-Tag existiert nicht: $RELEASE_TAG"
            exit 1
          fi

          app_version="$(sed -n 's/^[[:space:]]*versionName = "\([^"]*\)"/\1/p' app/build.gradle.kts | head -n 1)"
          if [ -z "$app_version" ] || [ "v$app_version" != "$RELEASE_TAG" ]; then
            echo "::error::Tag and app version differ / Tag und App-Version stimmen nicht überein: tag=$RELEASE_TAG app=$app_version"
            exit 1
          fi

          if ! grep -Fq "## [$app_version]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md has no matching version section / CHANGELOG.md enthält keinen passenden Versionsabschnitt: $app_version"
            exit 1
          fi

      - name: Determine signing mode / Signing-Modus ermitteln
        id: signing
        shell: bash
        run: |
          configured=0
          missing=0
          for name in SIGNING_KEYSTORE_BASE64 SIGNING_STORE_PASSWORD SIGNING_KEY_ALIAS SIGNING_KEY_PASSWORD; do
            if [ -n "${!name}" ]; then
              configured=$((configured + 1))
            else
              missing=$((missing + 1))
            fi
          done

          if [ "$configured" -gt 0 ] && [ "$missing" -gt 0 ]; then
            echo "::error::Signing is only partially configured / Signing ist unvollständig. Configure all four secrets or remove all of them / Alle vier Secrets setzen oder alle entfernen."
            exit 1
          fi

          if [ "$missing" -eq 0 ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "asset_suffix=" >> "$GITHUB_OUTPUT"
            echo "Production signing is configured / Produktives Signing ist konfiguriert."
          elif [[ "$RELEASE_TAG" == *-* ]]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "asset_suffix=-debug" >> "$GITHUB_OUTPUT"
            echo "::warning::No production-signing secrets / Keine produktiven Signing-Secrets. Publishing an explicitly named debug APK / Eine eindeutig benannte Debug-APK wird veröffentlicht."
          else
            echo "::error::Stable releases require all four production-signing secrets / Stabile Releases benötigen alle vier produktiven Signing-Secrets."
            exit 1
          fi
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}

      - name: Set up Java 17 / Java 17 einrichten
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle / Gradle einrichten
        uses: gradle/actions/setup-gradle@90ddb51e90a5fd9ba75f40cf85156b7b41bf76a3 # v6

      - name: Set up Android SDK / Android SDK einrichten
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4

      - name: Install Android 17 SDK / Android-17-SDK installieren
        run: sdkmanager "platforms;android-37.0" "build-tools;36.0.0"

      - name: Make Gradle wrapper executable / Gradle Wrapper ausführbar machen
        run: chmod +x gradlew

      - name: Decode production keystore / Produktiven Keystore dekodieren
        if: steps.signing.outputs.enabled == 'true'
        run: |
          mkdir -p signing
          echo "$SIGNING_KEYSTORE_BASE64" | base64 -d > signing/thor-stream-release.jks
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}

      - name: Run unit tests / Unit Tests ausführen
        run: ./gradlew :app:testDebugUnitTest

      - name: Build production-signed APK / Produktiv signierte APK bauen
        if: steps.signing.outputs.enabled == 'true'
        run: ./gradlew :app:lintRelease :app:assembleRelease :app:bundleRelease
        env:
          SIGNING_STORE_FILE: thor-stream-release.jks
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}

      - name: Build debug-signed prerelease APK / Debug-signierte Prerelease-APK bauen
        if: steps.signing.outputs.enabled != 'true'
        run: ./gradlew :app:lintDebug :app:assembleDebug :app:bundleDebug

      - name: Rename artifacts and create checksums / Artefakte umbenennen und Prüfsummen erzeugen
        id: asset
        shell: bash
        run: |
          if [ "$SIGNING_ENABLED" = "true" ]; then
            source_apk="app/build/outputs/apk/release/app-release.apk"
            source_aab="app/build/outputs/bundle/release/app-release.aab"
          else
            source_apk="app/build/outputs/apk/debug/app-debug.apk"
            source_aab="app/build/outputs/bundle/debug/app-debug.aab"
          fi

          apk_asset="ThorStreamButler-${RELEASE_TAG}${ASSET_SUFFIX}.apk"
          aab_asset="ThorStreamButler-${RELEASE_TAG}${ASSET_SUFFIX}.aab"
          cp "$source_apk" "$apk_asset"
          cp "$source_aab" "$aab_asset"
          sha256sum "$apk_asset" > "$apk_asset.sha256"
          sha256sum "$aab_asset" > "$aab_asset.sha256"
          echo "apk_name=$apk_asset" >> "$GITHUB_OUTPUT"
          echo "aab_name=$aab_asset" >> "$GITHUB_OUTPUT"
        env:
          SIGNING_ENABLED: ${{ steps.signing.outputs.enabled }}
          ASSET_SUFFIX: ${{ steps.signing.outputs.asset_suffix }}

      - name: Verify artifact signatures / Artefaktsignaturen prüfen
        shell: bash
        run: |
          apksigner_path="$ANDROID_HOME/build-tools/36.0.0/apksigner"
          if [ ! -x "$apksigner_path" ]; then
            echo "::error::apksigner is unavailable at $apksigner_path / apksigner ist unter $apksigner_path nicht verfügbar."
            exit 1
          fi
          "$apksigner_path" verify --verbose --print-certs "$APK_ASSET"
          aab_verification="$(jarsigner -verify -verbose -certs "$AAB_ASSET" 2>&1)"
          printf '%s\n' "$aab_verification"
          if grep -Fqi 'jar is unsigned' <<< "$aab_verification" || ! grep -Fq 'jar verified.' <<< "$aab_verification"; then
            echo "::error::The Android App Bundle is not signed and verified / Das Android App Bundle ist nicht signiert und verifiziert."
            exit 1
          fi
        env:
          APK_ASSET: ${{ steps.asset.outputs.apk_name }}
          AAB_ASSET: ${{ steps.asset.outputs.aab_name }}

      - name: Prepare bilingual release notes / Zweisprachige Release Notes vorbereiten
        id: notes
        shell: bash
        run: |
          notes_path="docs/release-notes/${RELEASE_TAG}.md"
          if [ -f "$notes_path" ]; then
            cp "$notes_path" release-notes.md
          elif gh release view "$RELEASE_TAG" --json body --jq .body > release-notes.md; then
            if [ ! -s release-notes.md ]; then
              echo "::error::Existing release has empty notes / Vorhandenes Release hat leere Release Notes."
              exit 1
            fi
          else
            echo "::error::Missing $notes_path / $notes_path fehlt. Release notes must be bilingual / Release Notes müssen zweisprachig sein (EN/DE)."
            exit 1
          fi

          if ! grep -q '^## English$' release-notes.md || ! grep -q '^## Deutsch$' release-notes.md; then
            echo "::error::Release notes need equivalent English and German sections / Release Notes benötigen gleichwertige englische und deutsche Abschnitte."
            exit 1
          fi

          title="$(sed -n '1{s/^# //;p;}' release-notes.md)"
          if [ -z "$title" ]; then
            echo "::error::Release notes need a level-one title / Release Notes benötigen eine Überschrift erster Ebene."
            exit 1
          fi
          echo "title=$title" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create GitHub release / GitHub-Release erstellen
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ steps.notes.outputs.title }}
          body_path: release-notes.md
          prerelease: ${{ contains(env.RELEASE_TAG, '-') }}
          make_latest: ${{ contains(env.RELEASE_TAG, '-') && 'false' || 'true' }}
          files: |
            ThorStreamButler-${{ env.RELEASE_TAG }}*.apk
            ThorStreamButler-${{ env.RELEASE_TAG }}*.apk.sha256
            ThorStreamButler-${{ env.RELEASE_TAG }}*.aab
            ThorStreamButler-${{ env.RELEASE_TAG }}*.aab.sha256
          fail_on_unmatched_files: true
          overwrite_files: true
