name: Fehler melden
description: Reproduzierbares Problem in App, Diagnose oder Website melden
title: "[Bug]: "
labels: [bug, triage]
body:
  - type: markdown
    attributes:
      value: Danke für den Bericht. Bitte entferne IP-Adressen, SSIDs und MAC-Adressen aus Screenshots und Logs.
  - type: dropdown
    id: area
    attributes:
      label: Bereich
      options:
        - Dashboard / App-Start
        - Netzwerkdiagnose
        - Hosts / Wake-on-LAN
        - Einstellungen / Historie
        - Controller / Fokus
        - Projektwebsite
        - Build / Tests
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Problembeschreibung
      description: Was ist passiert und was wurde erwartet?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Schritte zur Reproduktion
      placeholder: |
        1. Öffne …
        2. Wähle …
        3. Beobachte …
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: Gerät und Android-Version
      placeholder: z. B. AYN Odin 2, Android 13
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: App-Version oder Commit
      placeholder: z. B. 0.1.0 oder 6622918
  - type: textarea
    id: context
    attributes:
      label: Zusätzlicher Kontext
      description: Bereinigte Logs oder Screenshots ohne sensible Netzwerkdaten.
  - type: checkboxes
    id: privacy
    attributes:
      label: Datenschutz
      options:
        - label: Ich habe IP-Adressen, SSIDs, MAC-Adressen und andere sensible Daten entfernt.
          required: true

