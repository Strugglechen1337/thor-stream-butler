name: Report a bug
description: Report a reproducible problem in the app, diagnostics, or project website
title: "[Bug]: "
labels: [bug, triage]
body:
  - type: markdown
    attributes:
      value: Thank you for the report. Remove IP addresses, SSIDs, MAC addresses, hostnames, and credentials from screenshots and logs.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Dashboard / app launch
        - Network diagnostics
        - Hosts / Wake-on-LAN
        - Settings / history
        - Controller / focus
        - Project website
        - Build / tests
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Problem description
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open …
        2. Select …
        3. Observe …
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: Device and Android version
      placeholder: For example, AYN Odin 2 on Android 13
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: App version or commit
      placeholder: For example, 0.1.0 or 6622918
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Sanitized logs or screenshots without private network data.
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed IP addresses, SSIDs, MAC addresses, hostnames, credentials, and other private data.
          required: true
