name: Suggest a feature
description: Propose an idea for the launcher, diagnostics, or handheld controls
title: "[Feature]: "
labels: [enhancement, triage]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem should this solve?
      description: Describe the use case, not only the requested feature.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Relevance
      options:
        - Common handheld workflow
        - Specific streaming service
        - Specific device or Android version
        - Usability improvement
  - type: checkboxes
    id: constraints
    attributes:
      label: Project principles
      options:
        - label: The idea works without an account, tracking, or cloud backend.
        - label: The idea can be used with both controller and touch input.
